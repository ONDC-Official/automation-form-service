<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Loan Information</title>
</head>

<body>
  <form id="personal_loan_information_form" method="POST" enctype="multipart/form-data" action="<%= actionUrl %>">

    <label for="panName">Name as Per PAN</label>
    <input type="text" id="panName" name="panName" required />

    <label for="personalemail">Personal Email</label>
    <input type="email" id="personalemail" name="personalemail" />

    <label for="officialemail">Official Email</label>
    <input type="email" id="officialEmail" name="officialemail" />

    <label for="dob">Date of Birth</label>
    <input type="date" id="dob" name="dob" required />

    <label for="gender">Gender</label>
    <select name="gender" id="gender" required>
      <option value="">Select Gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="transgender">Transgender</option>
    </select>

    <label for="pan">PAN</label>
    <input type="text" id="pan" name="pan" required pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}"
      title="PAN must be in format: ABCDE1234F" maxlength="10" placeholder="ABCDE1234F" />

    <label for="contactNumber">Contact Number</label>
    <input type="tel" id="contactNumber" name="contactNumber" required pattern="[6-9][0-9]{9}"
      title="Contact number must be 10 digits starting with 6, 7, 8, or 9" maxlength="10" placeholder="9876543210" />

    <label for="employmentType">Employment Type</label>
    <select name="employmentType" id="employmentType" required>
      <option value="">Select Employment Type</option>
      <option value="salaried">Salaried</option>
      <option value="selfEmployed">Self Employment</option>
    </select>

    <label for="income">Income</label>
    <input type="number" id="income" name="income" required />

    <label for="companyName">Company Name</label>
    <input type="text" id="companyName" name="companyName" required />

    <label for="udyamNumber">UDYAM Number</label>
    <input type="text" id="udyamNumber" name="udyamNumber" />

    <label for="addressL1">Address Line 1</label>
    <input type="text" id="addressL1" name="addressL1" />

    <label for="addressL2">Address Line 2</label>
    <input type="text" id="addressL2" name="addressL2" />

    <label for="city">City</label>
    <input type="text" id="city" name="city" />

    <label for="state">State</label>
    <input type="text" id="state" name="state" />

    <label for="pincode">Pin Code</label>
    <input type="text" id="pincode" name="pincode" pattern="[1-9][0-9]{5}"
      title="Pin code must be 6 digits and cannot start with 0" maxlength="6" placeholder="123456" />

    <label for="aa_id">Account Aggregator ID</label>
    <input type="text" id="aa_id" name="aa_id" />

    <label for="endUse">End Use</label>
    <select name="endUse" id="endUse" required>
      <option value="">Select End Use</option>
      <option value="consumerDurablePurchase">Purchase of Consumer Durables</option>
      <option value="education">Education</option>
      <option value="travel">Travel</option>
      <option value="health">Health</option>
      <option value="other">Other Consumption Purposes</option>
    </select>

    <label for="derivedData">Derived Data</label>
    <input name="derivedData" id="derivedData" type="file" accept=".json" />

    <label for="bureauConsent">Bureau Consent</label>
    <input type="checkbox" id="bureauConsent" name="bureauConsent" />

    <input type="hidden" id="formId" name="formId" value="FO1" />
    <input type="submit" value="Submit" />

  </form>
</body>

</html>
