<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vehicle Details</title>
</head>

<body>
  <form id="vehicle_details_form" method="POST" action="<%= actionUrl %>">

    <label for="firstName">First Name</label>
    <input type="text" id="firstName" name="firstName" pattern="[A-Za-z\s]{2,50}" maxlength="50" title="Name must contain only letters and spaces (2-50 characters)" required />

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" name="lastName" pattern="[A-Za-z\s]{2,50}" maxlength="50" title="Name must contain only letters and spaces (2-50 characters)" required />

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="example@email.com" />

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" pattern="[6-9][0-9]{9}" maxlength="10" title="Phone number must be 10 digits starting with 6, 7, 8, or 9" placeholder="9876543210" />

    <label for="gender">Gender</label>
    <select name="gender" id="gender" required>
      <option value="">Select</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="transgender">Transgender</option>
    </select>

    <label for="vehicleUniqueCode">Vehicle Unique Code</label>
    <input type="text" id="vehicleUniqueCode" name="vehicleUniqueCode" placeholder="From GIC master" />

    <label for="rtoCode">RTO Code <span style="color:red">*</span></label>
    <input type="text" id="rtoCode" name="rtoCode" pattern="[A-Z]{2}[0-9]{2}" maxlength="4" title="RTO Code must be 2 letters followed by 2 digits (e.g., GJ01)" placeholder="GJ01" required />

    <label for="registrationDate">Registration Date <span style="color:red">*</span></label>
    <input type="date" id="registrationDate" name="registrationDate" required />

    <label for="idv">IDV</label>
    <input type="number" id="idv" name="idv" min="0" placeholder="e.g., 500000" />

    <label for="coverType">Cover Type</label>
    <select name="coverType" id="coverType">
      <option value="">Select</option>
      <option value="thirdParty">Third Party</option>
      <option value="ownDamage">Own Damage</option>
      <option value="comprehensive">Comprehensive</option>
    </select>

    <label for="PersonalAccidentCover">Personal Accident Cover</label>
    <select name="PersonalAccidentCover" id="PersonalAccidentCover">
      <option value="">Select</option>
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>

    <label for="registrationNumber">Vehicle Registration Number</label>
    <input type="text" id="registrationNumber" name="registrationNumber" pattern="[A-Z]{2}[0-9]{1,2}\s?[A-Z]{0,3}\s?[0-9]{1,4}" title="Enter a valid registration number (e.g., HR26 AB 1234)" placeholder="HR26 AB 1234" />

    <label for="paTenure">PA Tenure</label>
    <input type="number" id="paTenure" name="paTenure" min="1" placeholder="e.g., 1" />

    <label for="policyTenure">Policy Tenure</label>
    <input type="number" id="policyTenure" name="policyTenure" min="1" placeholder="e.g., 1" />

    <label for="previousPolicyInsurerName">Previous Policy - Insurer Name</label>
    <input type="text" id="previousPolicyInsurerName" name="previousPolicyInsurerName" />

    <label for="previousPolicyType">Previous Policy - Policy Type</label>
    <select name="previousPolicyType" id="previousPolicyType">
      <option value="">Select</option>
      <option value="OD">Own Damage (OD)</option>
      <option value="TP">Third Party (TP)</option>
      <option value="comprehensive">Comprehensive</option>
    </select>

    <label for="previousPolicyNumber">Previous Policy - Policy Number</label>
    <input type="text" id="previousPolicyNumber" name="previousPolicyNumber" />

    <label for="previousPolicyDate">Previous Policy - Expiry Date</label>
    <input type="date" id="previousPolicyDate" name="previousPolicyDate" />

    <label for="previousPolicyCustomerName">Previous Policy - Customer Name</label>
    <input type="text" id="previousPolicyCustomerName" name="previousPolicyCustomerName" />

    <label for="claimStatus">
      <input type="checkbox" id="claimStatus" name="claimStatus" />
      Any claim in current policy
    </label>

    <label for="ncb">NCB %</label>
    <input type="number" id="ncb" name="ncb" min="0" max="100" placeholder="e.g., 20" />

    <input type="hidden" id="formId" name="formId" value="F01" />
    <input type="hidden" id="transactionId" name="transactionId"
      value="c04a04ee-d892-400f-bbe6-479a43b4448a" />

    <input type="submit" value="Submit" />
  </form>
</body>

</html>
