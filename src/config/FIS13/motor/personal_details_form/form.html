<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Details</title>
</head>

<body>
  <form id="personal_details_form" method="POST" action="<%= actionUrl %>">

    <label for="name">Full Name <span style="color:red">*</span></label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" pattern="[A-Za-z\s]{2,100}" maxlength="100" title="Name must contain only letters and spaces (2-100 characters)" required />

    <label for="address">Address <span style="color:red">*</span></label>
    <input type="text" id="address" name="address" placeholder="Enter address" required />

    <label for="dob">Date of Birth <span style="color:red">*</span></label>
    <input type="date" id="dob" name="dob" required />

    <label for="gender">Gender <span style="color:red">*</span></label>
    <select name="gender" id="gender" required>
      <option value="" disabled selected>Select gender</option>
      <option value="male">Male</option>
      <option value="female">Female</option>
      <option value="transgender">Transgender</option>
    </select>

    <label for="pep">Politically Exposed Person <span style="color:red">*</span></label>
    <select name="pep" id="pep" required>
      <option value="">-- Select --</option>
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>

    <label for="email">Email <span style="color:red">*</span></label>
    <input type="email" id="email" name="email" placeholder="example@email.com" required />

    <label for="phone">Phone <span style="color:red">*</span></label>
    <input type="tel" id="phone" name="phone" placeholder="9876543210" pattern="[6-9][0-9]{9}" maxlength="10" title="Phone number must be 10 digits starting with 6, 7, 8, or 9" required />

    <label for="gstin">GSTIN</label>
    <input type="text" id="gstin" name="gstin" placeholder="e.g., 22AAAAA0000A1Z5" pattern="[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}" maxlength="15" title="Enter a valid 15-character GSTIN" />

    <input type="hidden" id="formId" name="formId" value="F07">
    <input type="hidden" id="transactionId" name="transactionId" value="c04a04ee-d892-400f-bbe6-479a43b4448a">

    <input type="submit" value="Submit">

  </form>
</body>

</html>
